<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage  Users System</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
   

</head>  
<body>
 <div class="container">
    <form method="post"  target="_blank" action="./displayData.html" id="form-style">
        <div class="row">
            <div class="field">
        <label for="fname"> First Name:</label>
    <input type="text" class="form-control"id="fname" placeholder="Enter Your First Name "required/>
            </div>
    <div class="field">

    <label for="lname"> Last Name:</label>
    <input type="text"class="form-control" id="lname" placeholder="Enter Your Last Name "required/>
    </div>
</div>
            

<div class="row">
    <div class="field">
     <label for="birth-date">BirthDate:</label>
    <input type="date" class="form-control"id="birth-date" placeholder="Enter Your BirthDate"required/>
</div>
            <div class="field">

     <label for="age"> Age:</label>
    <input type="number"class="form-control" id="age"disabled/>
</div>
</div>
<div class="field">
<label for="gender">Choose gender:</label>
<select class="form-control" id="gender" name="gender">
<option value="" selected disabled>Select Gender</option>
    <option value="Female">Female</option>
  <option value="Male">Male</option>
</select>
</div>
<div class="radio-group">
 <label>
    <input type="radio" name="grade" id="graduate" value="Graduate">
    Graduate
</label>
 <label>
    <input type="radio" name="grade" id="ungraduate" value="Student"/>
    Student
</label>
</div>
    <div id="btn">
  <button id="submit-btn">Add User</button>
    </div>    
</form>
</div>




</body> 
<script src="script.js"></script>
</html>
